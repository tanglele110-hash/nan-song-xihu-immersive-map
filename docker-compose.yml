services:
  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 4174
      LOG_LEVEL: info
      CONTENT_ROOT: /app
      CONTENT_CACHE_TTL_MS: 1000
    expose:
      - "4174"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4174/api/v1/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
